<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="XIUGU">
<title>XIUGU — 記帳</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Noto+Serif+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --metal:linear-gradient(118deg,#7a7a7a 0%,#a8a8a8 24%,#dcdcdc 42%,#ffffff 50%,#d4d4d4 60%,#a0a0a0 80%,#808080 100%);
  --metal-text:linear-gradient(160deg,#777 0%,#fff 35%,#ccc 50%,#fff 65%,#888 100%);
  --bg:#080808;
  --card:#131313;
  --border:#262626;
  --sidebar-w:260px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);color:#c8c8c8;font-family:'Noto Serif TC',serif;font-weight:400;width:100%;min-height:100vh;-webkit-font-smoothing:antialiased;font-size:16px;}
input,button,textarea,select{font-family:inherit;font-size:16px;}
.metal-text{background:var(--metal-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.en{font-family:'Playfair Display',serif;}

/* ====== 通用按鈕 ====== */
.btn-metal{width:100%;height:52px;border:none;border-radius:8px;cursor:pointer;font-family:'Playfair Display',serif;font-weight:600;font-size:15px;letter-spacing:0.3em;padding-left:0.3em;color:#1a1a1a;background:var(--metal);box-shadow:0 0 14px rgba(220,220,220,0.12);transition:filter 0.2s;}
.btn-metal:active{filter:brightness(1.1);}
.btn-ghost{background:transparent;border:0.5px solid #2e2e2e;color:#999;height:46px;border-radius:8px;font-size:14px;letter-spacing:0.1em;cursor:pointer;transition:all 0.2s;width:100%;}
.btn-ghost:active,.btn-ghost:hover{border-color:#888;color:#ddd;}

/* ====== 輸入框 ====== */
.field{margin-bottom:16px;}
.flabel{font-size:11px;letter-spacing:0.25em;color:#888;margin-bottom:8px;display:block;}
.finput{width:100%;background:#0e0e0e;border:0.5px solid #2e2e2e;border-radius:8px;height:48px;padding:0 14px;color:#e8e8e8;font-size:16px;outline:none;transition:border-color 0.2s;}
.finput:focus{border-color:#666;}
.finput::placeholder{color:#383838;}

/* ====== 登入畫面 ====== */
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;}
#login{align-items:center;justify-content:center;}
#login .login-inner{width:100%;max-width:400px;padding:40px 32px;}
#login .logo-wrap{text-align:center;margin-bottom:52px;}
#login .logo{font-family:'Playfair Display',serif;font-size:38px;letter-spacing:0.16em;font-weight:700;}
#login .sub{font-size:10px;letter-spacing:0.45em;color:#555;margin-top:10px;}
#login .divider{color:#2a2a2a;font-size:10px;letter-spacing:0.3em;text-align:center;padding:12px 0;}
#login .forgot{text-align:center;margin-top:24px;font-size:13px;color:#555;letter-spacing:0.1em;cursor:pointer;transition:color 0.2s;}
#login .forgot:hover{color:#aaa;}

/* ====== APP 主框架 ====== */
#app{flex-direction:column;min-height:100vh;}

/* ====== Topbar（手機用）====== */
.topbar{padding:16px 20px;border-bottom:0.5px solid #1a1a1a;display:flex;align-items:center;justify-content:space-between;background:var(--bg);position:sticky;top:0;z-index:20;}
.topbar .ico{font-size:22px;color:#b0b0b0;cursor:pointer;background:none;border:none;width:32px;line-height:1;}
.topbar .logo{font-family:'Playfair Display',serif;font-size:18px;letter-spacing:0.14em;color:#f0f0f0;font-weight:600;}

/* ====== 內容區 ====== */
.body-pad{padding:24px 20px;max-width:100%;}
.sec-title{font-size:14px;font-weight:600;color:#f0f0f0;letter-spacing:0.15em;margin-bottom:20px;display:flex;align-items:center;gap:8px;}
.diamond-sep{color:#2e2e2e;font-size:10px;letter-spacing:0.25em;text-align:center;padding:20px 0;}

/* ====== 抽屜選單（手機/平板直立）====== */
.drawer-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.65);z-index:40;backdrop-filter:blur(2px);}
.drawer-mask.active{display:block;}
.drawer{position:fixed;top:0;left:0;bottom:0;width:280px;background:#0a0a0a;border-right:0.5px solid #1e1e1e;z-index:50;transform:translateX(-100%);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;}
.drawer.active{transform:translateX(0);}
.drawer .dh{padding:28px 22px 22px;border-bottom:0.5px solid #1a1a1a;}
.drawer .dh .lg{font-family:'Playfair Display',serif;font-size:22px;letter-spacing:0.14em;color:#f2f2f2;font-weight:600;}
.drawer .dh .sb{font-size:9px;letter-spacing:0.4em;color:#555;margin-top:6px;}
.drawer .items{padding:12px 10px;flex:1;overflow-y:auto;}
.di{display:flex;align-items:center;gap:14px;padding:14px 16px;border-radius:10px;cursor:pointer;color:#c0c0c0;font-size:14px;transition:all 0.15s;letter-spacing:0.05em;}
.di .ic{font-size:18px;color:#888;width:22px;text-align:center;flex-shrink:0;}
.di:hover{background:#141414;color:#e0e0e0;}
.di.on{background:#161616;color:#fff;}
.di.on .ic{color:#c0c0c0;}
.drawer .div{height:0.5px;background:#1a1a1a;margin:6px 16px;}
.drawer .ft{text-align:center;color:#2e2e2e;font-size:10px;letter-spacing:0.35em;padding:16px;}

/* ====== 側邊導覽（桌機/平板橫向）====== */
.sidebar{display:none;width:var(--sidebar-w);min-height:100vh;background:#0a0a0a;border-right:0.5px solid #1a1a1a;flex-direction:column;flex-shrink:0;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sidebar .sh{padding:32px 24px 24px;border-bottom:0.5px solid #1a1a1a;}
.sidebar .sh .lg{font-family:'Playfair Display',serif;font-size:22px;letter-spacing:0.14em;color:#f2f2f2;font-weight:600;}
.sidebar .sh .sb{font-size:9px;letter-spacing:0.4em;color:#555;margin-top:6px;}
.sidebar .items{padding:14px 12px;flex:1;}
.sidebar .ft{text-align:center;color:#2a2a2a;font-size:10px;letter-spacing:0.35em;padding:20px;}
.main-area{flex:1;overflow-y:auto;min-height:100vh;}

/* ====== 服務方框 ====== */
.svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.svc-box{height:52px;border-radius:8px;display:flex;align-items:center;justify-content:space-between;padding:0 15px;cursor:pointer;background:#0e0e0e;border:0.5px solid #2a2a2a;transition:all 0.15s;}
.svc-box .nm{color:#a0a0a0;font-size:14px;}
.svc-box .ck{font-size:16px;color:transparent;transition:color 0.15s;}
.svc-box:hover{border-color:#444;}
.svc-box.sel{background:var(--metal);border-color:#bbb;box-shadow:0 0 14px rgba(220,220,220,0.1);}
.svc-box.sel .nm{color:#1a1a1a;font-weight:600;}
.svc-box.sel .ck{color:#1a1a1a;}

/* ====== 簽名 ====== */
.sign-prev{background:#f0f0f0;border-radius:8px;height:88px;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;overflow:hidden;transition:opacity 0.2s;}
.sign-prev:hover{opacity:0.9;}
.sign-prev .ph{color:#aaa;font-size:13px;letter-spacing:0.1em;}
.sign-prev img{max-height:76px;max-width:90%;}
.sign-prev .zo{position:absolute;bottom:7px;right:10px;font-size:15px;color:#aaa;}

/* 簽名 Modal */
.sign-modal{display:none;position:fixed;inset:0;background:#080808;z-index:60;flex-direction:column;padding:20px;}
.sign-modal.active{display:flex;}
.sign-modal .hd{font-size:13px;color:#aaa;letter-spacing:0.2em;text-align:center;margin-bottom:14px;}
.sign-canvas-wrap{flex:1;background:#f4f4f4;border-radius:10px;position:relative;overflow:hidden;}
#signCanvas{width:100%;height:100%;touch-action:none;display:block;}
.sign-hint{position:absolute;top:50%;left:0;right:0;text-align:center;color:#bbb;font-size:14px;pointer-events:none;transform:translateY(-50%);}
.sign-btns{display:flex;gap:10px;margin-top:14px;}
.sign-btns button{flex:1;height:46px;}

/* 橫向提示 */
.landscape-hint{display:none;position:fixed;inset:0;background:rgba(8,8,8,0.95);z-index:55;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.landscape-hint.show{display:flex;}
.landscape-hint .hint-icon{font-size:48px;}
.landscape-hint .hint-text{font-size:14px;color:#888;letter-spacing:0.2em;text-align:center;line-height:1.8;}
.landscape-hint .hint-skip{font-size:12px;color:#555;cursor:pointer;margin-top:8px;letter-spacing:0.15em;}
.landscape-hint .hint-skip:hover{color:#999;}

/* ====== 記錄卡 ====== */
.rec{background:var(--card);border:0.5px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:border-color 0.15s;}
.rec:hover{border-color:#3a3a3a;}
.rec .nm{color:#e8e8e8;font-size:15px;font-weight:500;}
.rec .meta{color:#666;font-size:12px;margin-top:4px;}
.rec .pr{font-family:'Playfair Display',serif;color:#d0d0d0;font-size:16px;flex-shrink:0;margin-left:12px;}

/* ====== 數據卡 ====== */
.stat-big{background:linear-gradient(130deg,#141414 0%,#202020 50%,#141414 100%);border:0.5px solid #2e2e2e;border-radius:14px;padding:24px 26px;position:relative;overflow:hidden;}
.stat-big::before{content:'';position:absolute;top:-30px;right:-30px;width:120px;height:120px;background:radial-gradient(circle,rgba(255,255,255,0.03) 0%,transparent 70%);}
.stat-big .lb{font-size:10px;letter-spacing:0.35em;color:#777;margin-bottom:10px;}
.stat-big .num{font-family:'Playfair Display',serif;font-size:40px;font-weight:600;color:#fff;}
.stat-big .cnt{font-size:12px;color:#666;margin-top:8px;}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.stat-sm{background:#0e0e0e;border:0.5px solid #222;border-radius:12px;padding:16px;}
.stat-sm .lb{font-size:10px;letter-spacing:0.22em;color:#666;}
.stat-sm .num{font-family:'Playfair Display',serif;font-size:22px;color:#e0e0e0;margin-top:6px;font-weight:500;}

/* ====== 月份切換 ====== */
.msel{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.msel .mtxt{font-family:'Playfair Display',serif;font-size:20px;color:#e8e8e8;}
.mbtn{background:none;border:0.5px solid #252525;color:#777;width:38px;height:38px;border-radius:8px;font-size:18px;cursor:pointer;transition:all 0.2s;}
.mbtn:hover{border-color:#666;color:#ccc;}
.svc-stat{display:flex;justify-content:space-between;padding:12px 0;border-bottom:0.5px solid #181818;font-size:14px;}
.svc-stat .k{color:#888;}
.svc-stat .v{color:#ddd;font-family:'Playfair Display',serif;}

/* ====== Toast ====== */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(16px);background:#181818;border:0.5px solid #333;color:#e0e0e0;padding:12px 24px;border-radius:10px;font-size:13px;letter-spacing:0.12em;z-index:200;opacity:0;transition:all 0.28s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ====== Modal ====== */
.modal-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:70;align-items:center;justify-content:center;padding:24px;backdrop-filter:blur(3px);}
.modal-mask.active{display:flex;}
.modal{background:#0f0f0f;border:0.5px solid #2a2a2a;border-radius:16px;padding:26px;width:100%;max-width:360px;max-height:90vh;overflow-y:auto;}
.modal .mt{font-size:15px;color:#f0f0f0;letter-spacing:0.1em;margin-bottom:18px;font-weight:600;}
.modal .mtext{font-size:13px;color:#999;line-height:1.8;margin-bottom:18px;}
.empty{text-align:center;color:#444;font-size:13px;letter-spacing:0.12em;padding:44px 0;}
.search-result-meta{color:#666;font-size:11px;margin-left:8px;}

/* ====== RWD ====== */

/* 平板橫向 + 桌機 */
@media (min-width:1024px),(min-width:768px) and (orientation:landscape){
  #app{flex-direction:row;}
  .topbar{display:none;}
  .sidebar{display:flex;}
  .drawer,.drawer-mask{display:none !important;}
  .body-pad{padding:32px 40px;max-width:800px;}
  .stat-big .num{font-size:44px;}
  .svc-grid{grid-template-columns:1fr 1fr 1fr;}
}

/* 平板直立 */
@media (min-width:640px) and (max-width:1023px) and (orientation:portrait){
  .body-pad{padding:28px 36px;max-width:600px;margin:0 auto;}
  .svc-grid{grid-template-columns:1fr 1fr 1fr;}
  .stat-big .num{font-size:42px;}
  #login .login-inner{max-width:440px;}
}

/* 桌機內容區上限寬度 */
@media (min-width:1400px){
  .body-pad{max-width:900px;}
}
</style>
</head>
<body>

<!-- ============ 登入畫面 ============ -->
<div class="screen active" id="login">
  <div class="login-inner">
    <div class="logo-wrap">
      <div class="logo metal-text">XIUGU</div>
      <div class="sub">HAIR STUDIO · TAOYUAN</div>
      <div class="divider">✦ &nbsp; ✦ &nbsp; ✦</div>
    </div>

    <div id="loginSetup" style="display:none;">
      <div class="field">
        <label class="flabel">設定密碼 SET PASSWORD</label>
        <input type="password" class="finput" id="setPw1" placeholder="輸入新密碼" inputmode="numeric">
      </div>
      <div class="field">
        <label class="flabel">再次確認 CONFIRM</label>
        <input type="password" class="finput" id="setPw2" placeholder="再輸入一次">
      </div>
      <div class="field">
        <label class="flabel">救援信箱 EMAIL</label>
        <input type="email" class="finput" id="setEmail" placeholder="your@gmail.com">
      </div>
      <button class="btn-metal" onclick="doSetup()">建立 CREATE</button>
    </div>

    <div id="loginNormal" style="display:none;">
      <div class="field">
        <label class="flabel">密碼 PASSWORD</label>
        <input type="password" class="finput" id="loginPw" placeholder="輸入密碼" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn-metal" onclick="doLogin()">登入 LOGIN</button>
      <div class="forgot" onclick="openForgot()">忘記密碼？</div>
    </div>
  </div>
</div>

<!-- ============ APP 主框架 ============ -->
<div class="screen" id="app">

  <!-- 側邊導覽（桌機/平板橫向）-->
  <nav class="sidebar">
    <div class="sh">
      <div class="lg metal-text">XIUGU</div>
      <div class="sb">HAIR STUDIO</div>
    </div>
    <div class="items">
      <div class="di on" data-view="add" onclick="nav('add')"><span class="ic">＋</span>新增記錄</div>
      <div class="di" data-view="today" onclick="nav('today')"><span class="ic">◈</span>今日營業額</div>
      <div class="di" data-view="month" onclick="nav('month')"><span class="ic">▦</span>月結報表</div>
      <div class="di" data-view="search" onclick="nav('search')"><span class="ic">⌕</span>搜尋客人</div>
      <div class="di" data-view="export" onclick="nav('export')"><span class="ic">⤓</span>匯出 Excel</div>
      <div class="div"></div>
      <div class="di" data-view="settings" onclick="nav('settings')"><span class="ic">⚙</span>設定</div>
      <div class="di" onclick="doLogout()"><span class="ic">⎋</span>登出</div>
    </div>
    <div class="ft">✦ &nbsp; ✦ &nbsp; ✦</div>
  </nav>

  <!-- 主內容 -->
  <div class="main-area">
    <!-- Topbar（手機/平板直立）-->
    <div class="topbar">
      <button class="ico" onclick="openDrawer()">&#9776;</button>
      <span class="logo">XIUGU</span>
      <span style="width:32px;"></span>
    </div>
    <div id="viewArea"></div>
  </div>
</div>

<!-- ============ 抽屜選單（手機/平板直立）============ -->
<div class="drawer-mask" id="drawerMask" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="dh">
    <div class="lg metal-text">XIUGU</div>
    <div class="sb">HAIR STUDIO</div>
  </div>
  <div class="items">
    <div class="di on" data-view="add" onclick="nav('add')"><span class="ic">＋</span>新增記錄</div>
    <div class="di" data-view="today" onclick="nav('today')"><span class="ic">◈</span>今日營業額</div>
    <div class="di" data-view="month" onclick="nav('month')"><span class="ic">▦</span>月結報表</div>
    <div class="di" data-view="search" onclick="nav('search')"><span class="ic">⌕</span>搜尋客人</div>
    <div class="di" data-view="export" onclick="nav('export')"><span class="ic">⤓</span>匯出 Excel</div>
    <div class="div"></div>
    <div class="di" data-view="settings" onclick="nav('settings')"><span class="ic">⚙</span>設定</div>
    <div class="di" onclick="doLogout()"><span class="ic">⎋</span>登出</div>
  </div>
  <div class="ft">✦ &nbsp; ✦ &nbsp; ✦</div>
</div>

<!-- ============ 簽名層 ============ -->
<div class="landscape-hint" id="landscapeHint">
  <div class="hint-icon">↺</div>
  <div class="hint-text">建議橫向簽名<br>畫面更大更好簽</div>
  <div class="hint-skip" onclick="skipLandscape()">直接簽名 →</div>
</div>

<div class="sign-modal" id="signModal">
  <div class="hd">請在框內簽名 SIGNATURE</div>
  <div class="sign-canvas-wrap">
    <canvas id="signCanvas"></canvas>
    <div class="sign-hint" id="signHint">請在此處簽名</div>
  </div>
  <div class="sign-btns">
    <button class="btn-ghost" onclick="signClear()">重簽</button>
    <button class="btn-ghost" onclick="signCancel()">返回</button>
    <button class="btn-metal" style="flex:1.5;" onclick="signDone()">完成</button>
  </div>
</div>

<!-- ============ 忘記密碼 Modal ============ -->
<div class="modal-mask" id="forgotMask">
  <div class="modal">
    <div class="mt">忘記密碼</div>
    <div id="forgotStep1">
      <div class="mtext">驗證碼將寄到你設定的救援信箱。</div>
      <button class="btn-metal" onclick="sendCode()">寄出驗證碼</button>
      <button class="btn-ghost" style="margin-top:10px;" onclick="closeForgot()">取消</button>
    </div>
    <div id="forgotStep2" style="display:none;">
      <div class="field"><label class="flabel">驗證碼</label><input class="finput" id="fgCode" placeholder="輸入 6 碼驗證碼" inputmode="numeric"></div>
      <div class="field"><label class="flabel">新密碼</label><input type="password" class="finput" id="fgNew" placeholder="設定新密碼"></div>
      <button class="btn-metal" onclick="resetPw()">重設密碼</button>
      <button class="btn-ghost" style="margin-top:10px;" onclick="closeForgot()">取消</button>
    </div>
  </div>
</div>

<!-- ============ 記錄詳情 Modal ============ -->
<div class="modal-mask" id="recMask">
  <div class="modal" id="recModalBody"></div>
</div>

<div class="toast" id="toast"></div>
<script src="app.js"></script>
</body>
</html>
