<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="XIUGU">
<title>XIUGU — 記帳</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Noto+Serif+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --metal:linear-gradient(118deg,#7a7a7a 0%,#a8a8a8 24%,#dcdcdc 42%,#ffffff 50%,#d4d4d4 60%,#a0a0a0 80%,#808080 100%);
  --metal-text:linear-gradient(160deg,#777 0%,#fff 35%,#ccc 50%,#fff 65%,#888 100%);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{background:#080808;color:#c8c8c8;font-family:'Noto Serif TC',serif;font-weight:400;width:100%;min-height:100vh;-webkit-font-smoothing:antialiased;font-size:16px;}
input,button,textarea{font-family:inherit;font-size:16px;}
.metal-text{background:var(--metal-text);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.en{font-family:'Playfair Display',serif;}

/* ====== 通用按鈕 ====== */
.btn-metal{width:100%;height:52px;border:none;border-radius:8px;cursor:pointer;font-family:'Playfair Display',serif;font-weight:600;font-size:15px;letter-spacing:0.3em;padding-left:0.3em;color:#1a1a1a;background:var(--metal);box-shadow:0 0 14px rgba(220,220,220,0.12);transition:filter 0.2s;}
.btn-metal:active{filter:brightness(1.1);}
.btn-metal:disabled{background:#1e1e1e;color:#444;box-shadow:none;cursor:default;}
.btn-ghost{background:transparent;border:0.5px solid #2e2e2e;color:#999;height:46px;border-radius:8px;font-size:14px;letter-spacing:0.1em;cursor:pointer;transition:all 0.2s;}
.btn-ghost:active{border-color:#888;color:#ddd;}

/* ====== 輸入框 ====== */
.field{margin-bottom:16px;}
.flabel{font-size:11px;letter-spacing:0.25em;color:#888;margin-bottom:8px;display:block;}
.finput{width:100%;background:#131313;border:0.5px solid #2e2e2e;border-radius:8px;height:48px;padding:0 14px;color:#e8e8e8;font-size:16px;outline:none;transition:border-color 0.2s;}
.finput:focus{border-color:#888;}
.finput::placeholder{color:#444;}

/* ====== 畫面切換 ====== */
.screen{display:none;min-height:100vh;}
.screen.active{display:block;}
.topbar{padding:20px;border-bottom:0.5px solid #1e1e1e;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#080808;z-index:20;}
.topbar .ico{font-size:24px;color:#c4c4c4;cursor:pointer;background:none;border:none;width:30px;}
.topbar .logo{font-family:'Playfair Display',serif;font-size:19px;letter-spacing:0.14em;color:#f2f2f2;font-weight:600;}
.body-pad{padding:20px;}
.sec-title{font-size:15px;font-weight:600;color:#f2f2f2;letter-spacing:0.12em;margin-bottom:18px;display:flex;align-items:center;gap:8px;}
.diamond{color:#3a3a3a;font-size:11px;letter-spacing:0.2em;text-align:center;padding:18px 0;}

/* ====== 登入 ====== */
#login .wrap{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:0 32px;}
#login .logo{font-family:'Playfair Display',serif;font-size:34px;letter-spacing:0.16em;font-weight:700;padding-left:0.16em;}
#login .sub{font-size:10px;letter-spacing:0.4em;color:#666;margin-top:10px;padding-left:0.4em;}
#login .form{width:100%;max-width:320px;margin-top:48px;}
#login .forgot{text-align:center;margin-top:22px;font-size:13px;color:#666;letter-spacing:0.1em;cursor:pointer;}
#login .forgot:active{color:#aaa;}

/* ====== 服務方框 ====== */
.svc-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.svc-box{height:52px;border-radius:8px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;cursor:pointer;background:#141414;border:0.5px solid #333;transition:all 0.15s;}
.svc-box .nm{color:#b0b0b0;font-size:15px;}
.svc-box .ck{font-size:17px;color:transparent;}
.svc-box.sel{background:var(--metal);border-color:#ccc;box-shadow:0 0 12px rgba(220,220,220,0.12);}
.svc-box.sel .nm{color:#1a1a1a;font-weight:600;}
.svc-box.sel .ck{color:#1a1a1a;}

/* ====== 簽名 ====== */
.sign-prev{background:#f4f4f4;border-radius:8px;height:90px;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer;overflow:hidden;}
.sign-prev .ph{color:#999;font-size:13px;letter-spacing:0.1em;}
.sign-prev img{max-height:78px;max-width:90%;}
.sign-prev .zo{position:absolute;bottom:6px;right:9px;font-size:16px;color:#999;}
.sign-modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;min-height:100vh;background:#080808;z-index:60;flex-direction:column;padding:20px;}
.sign-modal.active{display:flex;}
.sign-modal .hd{font-size:14px;color:#ccc;letter-spacing:0.15em;text-align:center;margin-bottom:14px;}
.sign-canvas-wrap{flex:1;background:#f4f4f4;border-radius:10px;position:relative;overflow:hidden;}
#signCanvas{width:100%;height:100%;touch-action:none;display:block;}
.sign-hint{position:absolute;top:50%;left:0;right:0;text-align:center;color:#bbb;font-size:14px;pointer-events:none;transform:translateY(-50%);}
.sign-btns{display:flex;gap:10px;margin-top:16px;}
.sign-btns button{flex:1;}

/* ====== 記錄卡 ====== */
.rec{background:#131313;border:0.5px solid #262626;border-radius:10px;padding:14px 15px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
.rec .nm{color:#e8e8e8;font-size:15px;font-weight:500;}
.rec .meta{color:#777;font-size:12px;margin-top:4px;}
.rec .pr{font-family:'Playfair Display',serif;color:#d4d4d4;font-size:16px;}

/* ====== 數據卡 ====== */
.stat-big{background:linear-gradient(125deg,#161616 0%,#242424 50%,#161616 100%);border:0.5px solid #333;border-radius:14px;padding:22px 24px;position:relative;overflow:hidden;}
.stat-big .lb{font-size:11px;letter-spacing:0.3em;color:#888;margin-bottom:10px;}
.stat-big .num{font-family:'Playfair Display',serif;font-size:38px;font-weight:600;color:#fff;}
.stat-big .cnt{font-size:12px;color:#777;margin-top:6px;}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
.stat-sm{background:#141414;border:0.5px solid #2a2a2a;border-radius:12px;padding:14px;}
.stat-sm .lb{font-size:10px;letter-spacing:0.2em;color:#777;}
.stat-sm .num{font-family:'Playfair Display',serif;font-size:20px;color:#e8e8e8;margin-top:4px;font-weight:500;}

/* ====== 抽屜選單 ====== */
.drawer-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:40;}
.drawer-mask.active{display:block;}
.drawer{position:fixed;top:0;left:0;bottom:0;width:270px;background:#0d0d0d;border-right:0.5px solid #222;z-index:50;transform:translateX(-100%);transition:transform 0.28s ease;display:flex;flex-direction:column;}
.drawer.active{transform:translateX(0);}
.drawer .dh{padding:26px 22px 20px;border-bottom:0.5px solid #1e1e1e;}
.drawer .dh .lg{font-family:'Playfair Display',serif;font-size:22px;letter-spacing:0.14em;color:#f2f2f2;font-weight:600;}
.drawer .dh .sb{font-size:9px;letter-spacing:0.35em;color:#6e6e6e;margin-top:6px;}
.drawer .items{padding:10px;flex:1;overflow-y:auto;}
.di{display:flex;align-items:center;gap:14px;padding:15px 14px;border-radius:10px;cursor:pointer;color:#d8d8d8;font-size:15px;transition:background 0.15s;}
.di .ic{font-size:20px;color:#b0b0b0;width:22px;text-align:center;}
.di:active,.di.on{background:#1a1a1a;}
.di.on{color:#fff;}
.di.on .ic{color:#fff;}
.drawer .div{height:0.5px;background:#222;margin:8px 14px;}
.drawer .ft{text-align:center;color:#3a3a3a;font-size:11px;letter-spacing:0.3em;padding:16px;}

/* ====== 月份切換 ====== */
.msel{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.msel .mtxt{font-family:'Playfair Display',serif;font-size:18px;color:#e8e8e8;letter-spacing:0.05em;}
.mbtn{background:none;border:0.5px solid #2a2a2a;color:#888;width:36px;height:36px;border-radius:8px;font-size:18px;cursor:pointer;}
.mbtn:active{border-color:#888;color:#ddd;}
.svc-stat{display:flex;justify-content:space-between;padding:11px 0;border-bottom:0.5px solid #1a1a1a;font-size:14px;}
.svc-stat .k{color:#999;}
.svc-stat .v{color:#e0e0e0;font-family:'Playfair Display',serif;}

/* ====== Toast ====== */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a1a;border:0.5px solid #3a3a3a;color:#e8e8e8;padding:12px 22px;border-radius:10px;font-size:14px;letter-spacing:0.1em;z-index:100;opacity:0;transition:all 0.3s;pointer-events:none;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ====== Modal 通用 ====== */
.modal-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:70;align-items:center;justify-content:center;padding:28px;}
.modal-mask.active{display:flex;}
.modal{background:#111;border:0.5px solid #2e2e2e;border-radius:14px;padding:24px;width:100%;max-width:340px;}
.modal .mt{font-size:15px;color:#f2f2f2;letter-spacing:0.1em;margin-bottom:16px;font-weight:600;}
.modal .mtext{font-size:13px;color:#aaa;line-height:1.7;margin-bottom:18px;}
.empty{text-align:center;color:#555;font-size:13px;letter-spacing:0.1em;padding:40px 0;}
.search-result-meta{color:#777;font-size:12px;margin-top:4px;}
</style>
</head>
<body>

<!-- ============ 登入畫面 ============ -->
<div class="screen active" id="login">
  <div class="wrap">
    <div style="text-align:center;">
      <div class="logo metal-text">XIUGU</div>
      <div class="sub">HAIR STUDIO · TAOYUAN</div>
      <div class="diamond" style="padding:14px 0 0;">✦&nbsp;✦&nbsp;✦</div>
    </div>
    <div class="form">
      <div id="loginSetup" style="display:none;">
        <div class="field">
          <label class="flabel">設定密碼 SET PASSWORD</label>
          <input type="password" class="finput" id="setPw1" placeholder="輸入新密碼" inputmode="numeric">
        </div>
        <div class="field">
          <label class="flabel">再次確認</label>
          <input type="password" class="finput" id="setPw2" placeholder="再輸入一次">
        </div>
        <div class="field">
          <label class="flabel">救援信箱 EMAIL（忘記密碼用）</label>
          <input type="email" class="finput" id="setEmail" placeholder="your@gmail.com">
        </div>
        <button class="btn-metal" onclick="doSetup()">建立 CREATE</button>
      </div>
      <div id="loginNormal" style="display:none;">
        <div class="field">
          <label class="flabel">密碼 PASSWORD</label>
          <input type="password" class="finput" id="loginPw" placeholder="輸入密碼" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <button class="btn-metal" onclick="doLogin()">登入 LOGIN</button>
        <div class="forgot" onclick="openForgot()">忘記密碼？</div>
      </div>
    </div>
  </div>
</div>

<!-- ============ 主框架（登入後） ============ -->
<div class="screen" id="app">
  <div class="topbar">
    <button class="ico" onclick="openDrawer()">&#9776;</button>
    <span class="logo">XIUGU</span>
    <span style="width:30px;"></span>
  </div>
  <div id="viewArea"></div>
</div>

<!-- ============ 抽屜選單 ============ -->
<div class="drawer-mask" id="drawerMask" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="dh">
    <div class="lg metal-text">XIUGU</div>
    <div class="sb">HAIR STUDIO</div>
  </div>
  <div class="items">
    <div class="di on" data-view="add" onclick="nav('add')"><span class="ic">＋</span>新增記錄</div>
    <div class="di" data-view="today" onclick="nav('today')"><span class="ic">$</span>今日營業額</div>
    <div class="di" data-view="month" onclick="nav('month')"><span class="ic">▦</span>月結報表</div>
    <div class="di" data-view="search" onclick="nav('search')"><span class="ic">⌕</span>搜尋客人</div>
    <div class="di" data-view="export" onclick="nav('export')"><span class="ic">⤓</span>匯出 Excel</div>
    <div class="div"></div>
    <div class="di" data-view="settings" onclick="nav('settings')"><span class="ic">⚙</span>設定</div>
    <div class="di" onclick="doLogout()"><span class="ic">⎋</span>登出</div>
  </div>
  <div class="ft">✦&nbsp;✦&nbsp;✦</div>
</div>

<!-- ============ 簽名放大層 ============ -->
<div class="sign-modal" id="signModal">
  <div class="hd">請在框內簽名 SIGNATURE</div>
  <div class="sign-canvas-wrap">
    <canvas id="signCanvas"></canvas>
    <div class="sign-hint" id="signHint">請在此處簽名</div>
  </div>
  <div class="sign-btns">
    <button class="btn-ghost" onclick="signClear()">重簽</button>
    <button class="btn-ghost" onclick="signCancel()">返回</button>
    <button class="btn-metal" style="height:46px;flex:1.4;" onclick="signDone()">完成</button>
  </div>
</div>

<!-- ============ 忘記密碼 Modal ============ -->
<div class="modal-mask" id="forgotMask">
  <div class="modal">
    <div class="mt">忘記密碼</div>
    <div id="forgotStep1">
      <div class="mtext">驗證碼將寄到你設定的救援信箱。</div>
      <button class="btn-metal" onclick="sendCode()">寄出驗證碼</button>
      <button class="btn-ghost" style="width:100%;margin-top:10px;" onclick="closeForgot()">取消</button>
    </div>
    <div id="forgotStep2" style="display:none;">
      <div class="field"><label class="flabel">驗證碼</label><input class="finput" id="fgCode" placeholder="輸入收到的 6 碼" inputmode="numeric"></div>
      <div class="field"><label class="flabel">新密碼</label><input type="password" class="finput" id="fgNew" placeholder="設定新密碼"></div>
      <button class="btn-metal" onclick="resetPw()">重設密碼</button>
      <button class="btn-ghost" style="width:100%;margin-top:10px;" onclick="closeForgot()">取消</button>
    </div>
  </div>
</div>

<!-- ============ 記錄詳情 / 編輯 Modal ============ -->
<div class="modal-mask" id="recMask">
  <div class="modal" id="recModalBody"></div>
</div>

<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
